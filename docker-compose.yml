services:
  postgres:
    image: postgres:16-alpine
    container_name: fayno_postgres
    environment:
      POSTGRES_DB: fayno_shop
      POSTGRES_USER: fayno
      POSTGRES_PASSWORD: fayno_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fayno -d fayno_shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fayno_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fayno.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
